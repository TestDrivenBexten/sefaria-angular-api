<main>
  <div class="search-container">
    <div class="search-row">
      <input
        type="text"
        class="search-input"
        placeholder="e.g. Genesis 1:1"
        [value]="query()"
        (input)="query.set($any($event.target).value)"
        (keydown.enter)="search()"
        aria-label="Search"
      />
      <button class="search-button" (click)="search()" [disabled]="loading()">
        {{ loading() ? 'Loading...' : 'Search' }}
      </button>
    </div>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    @if (result()) {
      <div class="result-header">
        <span class="ref">{{ result()!.heRef }}</span>
      </div>
      @if (hebrewText(); as verses) {
        <div class="hebrew-text" dir="rtl">
          @for (verse of verses; track $index) {
            <p [innerHTML]="verse"></p>
          }
        </div>
      } @else {
        <p class="error">No Hebrew text found for this reference.</p>
      }
    }
  </div>
</main>

<router-outlet />
